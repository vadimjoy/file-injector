name: Deploy dist to GitHub Pages

on:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build CSS bundle and themes
        run: npm run build

      - name: Prepare Pages artifact
        run: |
          rm -rf site
          mkdir -p site
          cp index.html site/
          if [ -d dist ]; then cp -R dist site/dist; fi
          if [ -d src ]; then cp -R src site/src; fi
          if [ -d docs ]; then cp -R docs site/docs; fi
          if [ -f LICENSE ]; then cp LICENSE site/; fi
          if [ -f README.md ]; then cp README.md site/; fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deploy
        uses: actions/deploy-pages@v4
