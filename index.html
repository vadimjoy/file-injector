<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AI CSS Kit — Демо компонентов</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css" integrity="sha512-SfZ6PfrE0tMumjHgNsx3Rp3bIanFkFJxuxMxkvZWS9Vyhi3F7S3Uz+jD06P88GJEY2c7fsa+X1JdZx+X0hm4Vg==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  <link rel="stylesheet" href="./src/css/index.css">
  <link rel="stylesheet" href="./src/demos/shared/playground.css">
  <link rel="stylesheet" href="./src/demos/showcase-app.css">
</head>
<body class="showcase-app">
  <div class="showcase-app__layout">
    <aside class="showcase-app__sidebar" aria-label="Каталог компонентов">
      <div class="showcase-app__brand">
        <h1 class="showcase-app__title">AI CSS Kit</h1>
        <p class="showcase-app__tagline">Одна страница — одно демо. Без сетки iframe.</p>
      </div>
      <div class="ui-field ui-field--sm">
        <label class="ui-label" for="theme-select">
          <i class="fa fa-paint-brush" aria-hidden="true"></i>
          Тема
        </label>
        <select class="ui-select" id="theme-select">
          <option value="default">Default (light)</option>
          <option value="dark">Dark</option>
          <option value="midnight">Midnight</option>
          <option value="corporate">Corporate</option>
          <option value="warm">Warm</option>
        </select>
      </div>
      <p class="showcase-app__hint">Из корня: <code>npm run build</code> (нужны <code>dist/themes/*.css</code>), затем <code>npm run demo</code> — открывайте по HTTP, не через <code>file://</code>.</p>
      <nav class="showcase-app__nav" aria-label="Компоненты">
        <ul class="showcase-app__nav-list" id="showcase-nav"></ul>
      </nav>
    </aside>
    <div class="showcase-app__main" id="showcase-stage" role="main" aria-live="polite"></div>
  </div>
  <script type="module" src="./src/demos/showcase-app.js"></script>
</body>
</html>
