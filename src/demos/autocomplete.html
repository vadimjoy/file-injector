<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { padding: 20px; background: var(--ui-color-bg); }
  </style>
</head>
<body>
  <div class="ui-autocomplete" style="max-width:400px;">
    <div class="ui-autocomplete__input-wrapper">
      <span class="ui-autocomplete__search-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
      <input type="text" class="ui-input" placeholder="Search...">
    </div>
    <div class="ui-autocomplete__dropdown">
      <div class="ui-autocomplete__item"><span class="ui-autocomplete__item-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg></span><span>Result item</span></div>
      <div class="ui-autocomplete__item ui-autocomplete__item--highlighted"><span>Highlighted item</span></div>
      <div class="ui-autocomplete__item"><span>Another item</span></div>
    </div>
  </div>
</body>
</html>
