<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Autocomplete Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 24px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Autocomplete</h2>
    
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Search Users</label>
          <div class="ui-autocomplete">
            <div class="ui-autocomplete__input-wrapper">
              <span class="ui-autocomplete__search-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
              </span>
              <input type="text" class="ui-input" placeholder="Type to search...">
            </div>
            <div class="ui-autocomplete__dropdown" style="display:none;">
              <div class="ui-autocomplete__item ui-autocomplete__item--highlighted">
                <span class="ui-autocomplete__item-icon">👤</span>
                <span>John Doe</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">👤</span>
                <span>Jane Smith</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">👤</span>
                <span>Bob Johnson</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium (with open dropdown)</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--md">
          <label class="ui-label">Search Products</label>
          <div class="ui-autocomplete">
            <div class="ui-autocomplete__input-wrapper">
              <span class="ui-autocomplete__search-icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
              </span>
              <input type="text" class="ui-input" placeholder="Type to search...">
            </div>
            <div class="ui-autocomplete__dropdown">
              <div class="ui-autocomplete__item ui-autocomplete__item--highlighted">
                <span class="ui-autocomplete__item-icon">📦</span>
                <span>MacBook Pro</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📦</span>
                <span>iPhone 15</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📦</span>
                <span>iPad Air</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📦</span>
                <span>AirPods Pro</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Search Locations</label>
          <div class="ui-autocomplete">
            <div class="ui-autocomplete__input-wrapper">
              <span class="ui-autocomplete__search-icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"></circle><path d="m21 21-4.35-4.35"></path></svg>
              </span>
              <input type="text" class="ui-input" placeholder="Search for cities...">
            </div>
            <div class="ui-autocomplete__dropdown">
              <div class="ui-autocomplete__item ui-autocomplete__item--highlighted">
                <span class="ui-autocomplete__item-icon">📍</span>
                <span>New York, USA</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📍</span>
                <span>London, UK</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📍</span>
                <span>Tokyo, Japan</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📍</span>
                <span>Paris, France</span>
              </div>
              <div class="ui-autocomplete__item">
                <span class="ui-autocomplete__item-icon">📍</span>
                <span>Sydney, Australia</span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
