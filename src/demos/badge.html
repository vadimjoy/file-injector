<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Badge Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Badge</h2>
    
    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-stack">
        <div class="u-cluster u-cluster--compact">
          <span class="ui-badge ui-badge--sm ui-badge--default">Default</span>
          <span class="ui-badge ui-badge--sm ui-badge--primary">Primary</span>
          <span class="ui-badge ui-badge--sm ui-badge--success">Success</span>
          <span class="ui-badge ui-badge--sm ui-badge--warning">Warning</span>
          <span class="ui-badge ui-badge--sm ui-badge--error">Error</span>
        </div>
        <div class="u-cluster u-cluster--compact">
          <span class="ui-badge ui-badge--sm ui-badge--primary ui-badge--dot">New</span>
          <span class="ui-badge ui-badge--sm ui-badge--success ui-badge--dot">Live</span>
          <span class="ui-badge ui-badge--sm ui-badge--warning ui-badge--dot">Pending</span>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-stack">
        <div class="u-cluster u-cluster--compact">
          <span class="ui-badge ui-badge--md ui-badge--default">Default</span>
          <span class="ui-badge ui-badge--md ui-badge--primary">Primary</span>
          <span class="ui-badge ui-badge--md ui-badge--success">Success</span>
          <span class="ui-badge ui-badge--md ui-badge--warning">Warning</span>
          <span class="ui-badge ui-badge--md ui-badge--error">Error</span>
        </div>
        <div class="u-cluster u-cluster--compact">
          <span class="ui-badge ui-badge--md ui-badge--primary ui-badge--dot">New</span>
          <span class="ui-badge ui-badge--md ui-badge--success ui-badge--dot">Live</span>
          <span class="ui-badge ui-badge--md ui-badge--warning ui-badge--dot">Pending</span>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-stack">
        <div class="u-cluster u-cluster--compact">
          <span class="ui-badge ui-badge--lg ui-badge--default">Default</span>
          <span class="ui-badge ui-badge--lg ui-badge--primary">Primary</span>
          <span class="ui-badge ui-badge--lg ui-badge--success">Success</span>
          <span class="ui-badge ui-badge--lg ui-badge--warning">Warning</span>
          <span class="ui-badge ui-badge--lg ui-badge--error">Error</span>
        </div>
        <div class="u-cluster u-cluster--compact">
          <span class="ui-badge ui-badge--lg ui-badge--primary ui-badge--dot">New</span>
          <span class="ui-badge ui-badge--lg ui-badge--success ui-badge--dot">Live</span>
          <span class="ui-badge ui-badge--lg ui-badge--warning ui-badge--dot">Pending</span>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
