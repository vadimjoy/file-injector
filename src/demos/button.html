<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button — AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
  <link rel="stylesheet" href="./shared/playground.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Button</h2>
    <main
      class="ui-playground"
      data-component="button"
      data-schema="./schemas/button.js"
    ></main>
  </section>
  <script type="module" src="./shared/playground.js"></script>
  <script type="module">
    import { Playground } from './shared/playground.js';

    document.querySelectorAll('.ui-playground').forEach(host => {
      const schemaUrl = host.dataset.schema;
      if (schemaUrl) {
        new Playground(host, schemaUrl);
      }
    });
  </script>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
