<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Button Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .button-row { 
      display: flex; 
      gap: 12px; 
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Buttons</h2>
    
    <div class="size-group">
      <h3>Small</h3>
      <div class="button-row">
        <button class="ui-button ui-button--primary ui-button--sm">Primary</button>
        <button class="ui-button ui-button--secondary ui-button--sm">Secondary</button>
        <button class="ui-button ui-button--ghost ui-button--sm">Ghost</button>
      </div>
      <div class="button-row">
        <button class="ui-button ui-button--primary ui-button--sm" disabled>Disabled</button>
        <button class="ui-button ui-button--secondary ui-button--sm" disabled>Disabled</button>
        <button class="ui-button ui-button--ghost ui-button--sm" disabled>Disabled</button>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="button-row">
        <button class="ui-button ui-button--primary ui-button--md">Primary Button</button>
        <button class="ui-button ui-button--secondary ui-button--md">Secondary Button</button>
        <button class="ui-button ui-button--ghost ui-button--md">Ghost Button</button>
      </div>
      <div class="button-row">
        <button class="ui-button ui-button--primary ui-button--md" disabled>Primary Disabled</button>
        <button class="ui-button ui-button--secondary ui-button--md" disabled>Secondary Disabled</button>
        <button class="ui-button ui-button--ghost ui-button--md" disabled>Ghost Disabled</button>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="button-row">
        <button class="ui-button ui-button--primary ui-button--lg">Primary Large</button>
        <button class="ui-button ui-button--secondary ui-button--lg">Secondary Large</button>
        <button class="ui-button ui-button--ghost ui-button--lg">Ghost Large</button>
      </div>
      <div class="button-row">
        <button class="ui-button ui-button--primary ui-button--lg" disabled>Primary Disabled</button>
        <button class="ui-button ui-button--secondary ui-button--lg" disabled>Secondary Disabled</button>
        <button class="ui-button ui-button--ghost ui-button--lg" disabled>Ghost Disabled</button>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
