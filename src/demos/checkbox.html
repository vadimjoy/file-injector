<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Checkbox</h2>
    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox">
          <span>Accept</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" checked>
          <span>Subscribe</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" disabled>
          <span>Disabled</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox">
          <span>Accept</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" checked>
          <span>Subscribe</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" disabled>
          <span>Disabled</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox">
          <span>Accept</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" checked>
          <span>Subscribe</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" disabled>
          <span>Disabled</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>
  </section>
<script src="./shared/demo-theme.js"></script>
</body>
</html>
