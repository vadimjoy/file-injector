<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox, Radio & Toggle - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 16px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Checkbox</h2>
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox">
          <span>Accept terms</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" checked>
          <span>Subscribe newsletter</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" disabled>
          <span>Disabled option</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox">
          <span>Accept terms and conditions</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" checked>
          <span>Subscribe to newsletter</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" disabled>
          <span>Disabled unchecked</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox">
          <span>I agree to the Terms of Service</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" checked>
          <span>Send me marketing emails</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" disabled>
          <span>Disabled option</span>
        </label>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>Radio</h2>
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm" checked>
          <span>Option 1</span>
        </label>
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm">
          <span>Option 2</span>
        </label>
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm" disabled>
          <span>Disabled</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md" checked>
          <span>Standard shipping</span>
        </label>
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md">
          <span>Express shipping</span>
        </label>
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md">
          <span>Free shipping</span>
        </label>
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md" disabled>
          <span>Not available</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg" checked>
          <span>Credit Card</span>
        </label>
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg">
          <span>PayPal</span>
        </label>
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg">
          <span>Bank Transfer</span>
        </label>
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg" disabled>
          <span>Cash on Delivery</span>
        </label>
      </div>
    </div>
  </section>

  <section class="section">
    <h2>Toggle</h2>
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox">
          <span>Notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox" checked>
          <span>Dark mode</span>
        </label>
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox" disabled>
          <span>Disabled</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox">
          <span>Email notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox" checked>
          <span>Push notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox">
          <span>Auto-save</span>
        </label>
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox" disabled>
          <span>Feature unavailable</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox">
          <span>Enable all notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox" checked>
          <span>Dark mode enabled</span>
        </label>
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox" disabled>
          <span>Admin setting</span>
        </label>
      </div>
    </div>
  </section>
</body>
</html>
