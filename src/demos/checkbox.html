<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkbox Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); 
      gap: 16px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Checkbox</h2>
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox">
          <span>Accept terms</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" checked>
          <span>Subscribe newsletter</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" disabled>
          <span>Disabled option</span>
        </label>
        <label class="ui-checkbox ui-checkbox--sm">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox">
          <span>Accept terms</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" checked>
          <span>Subscribe to newsletter</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" disabled>
          <span>Disabled option</span>
        </label>
        <label class="ui-checkbox ui-checkbox--md">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox">
          <span>Accept terms</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" checked>
          <span>Subscribe to newsletter</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" disabled>
          <span>Disabled option</span>
        </label>
        <label class="ui-checkbox ui-checkbox--lg">
          <input type="checkbox" disabled checked>
          <span>Disabled checked</span>
        </label>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
