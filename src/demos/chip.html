<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chip - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Chip</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="u-stack">
        <div class="u-cluster">
          <button class="ui-chip ui-chip--sm" type="button">Small</button>
          <button class="ui-chip ui-chip--md" type="button">Medium</button>
          <button class="ui-chip ui-chip--lg" type="button">Large</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">States</h3>
      <div class="u-stack">
        <div class="u-cluster">
          <button class="ui-chip ui-chip--md" type="button">Default</button>
          <button class="ui-chip ui-chip--md ui-chip--active" type="button" aria-pressed="true">Active</button>
          <button class="ui-chip ui-chip--md ui-chip--disabled" type="button" disabled aria-disabled="true">Disabled</button>
        </div>
        <p class="ui-text-small">
          Hover state is interactive — try hovering the Default chip above.
        </p>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Filter group</h3>
      <div class="u-stack">
        <div class="u-cluster u-cluster--compact">
          <button class="ui-chip ui-chip--md ui-chip--active" type="button" aria-pressed="true">All</button>
          <button class="ui-chip ui-chip--md" type="button" aria-pressed="false">Design</button>
          <button class="ui-chip ui-chip--md" type="button" aria-pressed="false">Development</button>
          <button class="ui-chip ui-chip--md" type="button" aria-pressed="false">Marketing</button>
          <button class="ui-chip ui-chip--md" type="button" aria-pressed="false">Research</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With icon</h3>
      <div class="u-stack">
        <div class="u-cluster">
          <button class="ui-chip ui-chip--sm" type="button">
            <span class="ui-chip__icon"><i class="fa fa-tag" aria-hidden="true"></i></span>
            Small
          </button>
          <button class="ui-chip ui-chip--md" type="button">
            <span class="ui-chip__icon"><i class="fa fa-star" aria-hidden="true"></i></span>
            Medium
          </button>
          <button class="ui-chip ui-chip--md ui-chip--active" type="button" aria-pressed="true">
            <span class="ui-chip__icon"><i class="fa fa-check" aria-hidden="true"></i></span>
            Active
          </button>
          <button class="ui-chip ui-chip--lg" type="button">
            <span class="ui-chip__icon"><i class="fa fa-bolt" aria-hidden="true"></i></span>
            Large
          </button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With dismiss</h3>
      <div class="u-stack">
        <div class="u-cluster">
          <button class="ui-chip ui-chip--sm" type="button">
            Small
            <span class="ui-chip__dismiss" role="button" aria-label="Remove Small">&times;</span>
          </button>
          <button class="ui-chip ui-chip--md" type="button">
            Frontend
            <span class="ui-chip__dismiss" role="button" aria-label="Remove Frontend">&times;</span>
          </button>
          <button class="ui-chip ui-chip--md ui-chip--active" type="button" aria-pressed="true">
            <span class="ui-chip__icon"><i class="fa fa-tag" aria-hidden="true"></i></span>
            Design
            <span class="ui-chip__dismiss" role="button" aria-label="Remove Design">&times;</span>
          </button>
          <button class="ui-chip ui-chip--lg" type="button">
            Large
            <span class="ui-chip__dismiss" role="button" aria-label="Remove Large">&times;</span>
          </button>
        </div>
      </div>
    </div>

  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
