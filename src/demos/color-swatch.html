<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Color Swatch - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Color Swatch</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Swatch group</h3>
      <div class="ui-swatch-group">
        <button class="ui-swatch" style="background:#4f46e5;" aria-pressed="true" aria-label="#4f46e5"></button>
        <button class="ui-swatch" style="background:#16a34a;" aria-pressed="false" aria-label="#16a34a"></button>
        <button class="ui-swatch" style="background:#d97706;" aria-pressed="false" aria-label="#d97706"></button>
        <button class="ui-swatch" style="background:#dc2626;" aria-pressed="false" aria-label="#dc2626"></button>
        <button class="ui-swatch" style="background:#0ea5e9;" aria-pressed="false" aria-label="#0ea5e9"></button>
        <button class="ui-swatch" style="background:#8b5cf6;" aria-pressed="false" aria-label="#8b5cf6"></button>
        <button class="ui-swatch" style="background:#ec4899;" aria-pressed="false" aria-label="#ec4899"></button>
        <button class="ui-swatch" style="background:#111827;" aria-pressed="false" aria-label="#111827"></button>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="ui-swatch-group">
        <button class="ui-swatch ui-swatch--sm" style="background:#4f46e5;" aria-label="Small"></button>
        <button class="ui-swatch" style="background:#4f46e5;" aria-label="Default"></button>
        <button class="ui-swatch ui-swatch--lg" style="background:#4f46e5;" aria-label="Large"></button>
        <button class="ui-swatch ui-swatch--xl" style="background:#4f46e5;" aria-label="XL"></button>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Square variant</h3>
      <div class="ui-swatch-group">
        <button class="ui-swatch ui-swatch--square" style="background:#4f46e5;" aria-label="#4f46e5"></button>
        <button class="ui-swatch ui-swatch--square" style="background:#16a34a;" aria-label="#16a34a"></button>
        <button class="ui-swatch ui-swatch--square" style="background:#d97706;" aria-label="#d97706"></button>
        <button class="ui-swatch ui-swatch--square" style="background:#dc2626;" aria-label="#dc2626"></button>
        <button class="ui-swatch ui-swatch--square" style="background:#0ea5e9;" aria-label="#0ea5e9"></button>
        <button class="ui-swatch ui-swatch--square" style="background:#8b5cf6;" aria-label="#8b5cf6"></button>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Color tiles (named)</h3>
      <div class="ui-palette">
        <div class="ui-color-tile">
          <div class="ui-color-tile__preview" style="background:#4f46e5;"></div>
          <div class="ui-color-tile__name">Primary</div>
          <div class="ui-color-tile__value">#4f46e5</div>
        </div>
        <div class="ui-color-tile">
          <div class="ui-color-tile__preview" style="background:#16a34a;"></div>
          <div class="ui-color-tile__name">Success</div>
          <div class="ui-color-tile__value">#16a34a</div>
        </div>
        <div class="ui-color-tile">
          <div class="ui-color-tile__preview" style="background:#d97706;"></div>
          <div class="ui-color-tile__name">Warning</div>
          <div class="ui-color-tile__value">#d97706</div>
        </div>
        <div class="ui-color-tile">
          <div class="ui-color-tile__preview" style="background:#dc2626;"></div>
          <div class="ui-color-tile__name">Error</div>
          <div class="ui-color-tile__value">#dc2626</div>
        </div>
        <div class="ui-color-tile">
          <div class="ui-color-tile__preview" style="background:#111827;"></div>
          <div class="ui-color-tile__name">Dark</div>
          <div class="ui-color-tile__value">#111827</div>
        </div>
        <div class="ui-color-tile">
          <div class="ui-color-tile__preview" style="background:#f9fafb;border:1px solid #e5e7eb;"></div>
          <div class="ui-color-tile__name">Subtle</div>
          <div class="ui-color-tile__value">#f9fafb</div>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Color scale</h3>
      <div class="ui-color-scale">
        <div class="ui-color-scale__step" style="background:#eef2ff;color:#312e81;">50</div>
        <div class="ui-color-scale__step" style="background:#e0e7ff;color:#312e81;">100</div>
        <div class="ui-color-scale__step" style="background:#c7d2fe;color:#312e81;">200</div>
        <div class="ui-color-scale__step" style="background:#a5b4fc;color:#312e81;">300</div>
        <div class="ui-color-scale__step" style="background:#818cf8;color:#fff;">400</div>
        <div class="ui-color-scale__step" style="background:#6366f1;color:#fff;">500</div>
        <div class="ui-color-scale__step" style="background:#4f46e5;color:#fff;">600</div>
        <div class="ui-color-scale__step" style="background:#4338ca;color:#fff;">700</div>
        <div class="ui-color-scale__step" style="background:#312e81;color:#fff;">900</div>
      </div>
    </div>

  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
