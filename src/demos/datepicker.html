<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Datepicker Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 24px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Date Picker</h2>
    
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Select Date</label>
          <div class="ui-datepicker">
            <div class="ui-datepicker__input-wrapper">
              <input type="text" class="ui-input" placeholder="MM/DD/YYYY" readonly value="12/25/2024">
              <span class="ui-datepicker__icon">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
            </div>
            <div class="ui-datepicker__calendar">
              <div class="ui-datepicker__header">
                <button class="ui-datepicker__nav">&#8249;</button>
                <span class="ui-datepicker__month-year">December 2024</span>
                <button class="ui-datepicker__nav">&#8250;</button>
              </div>
              <div class="ui-datepicker__grid">
                <div class="ui-datepicker__weekday">Su</div><div class="ui-datepicker__weekday">Mo</div><div class="ui-datepicker__weekday">Tu</div><div class="ui-datepicker__weekday">We</div><div class="ui-datepicker__weekday">Th</div><div class="ui-datepicker__weekday">Fr</div><div class="ui-datepicker__weekday">Sa</div>
                <button class="ui-datepicker__day ui-datepicker__day--muted">26</button><button class="ui-datepicker__day ui-datepicker__day--muted">27</button><button class="ui-datepicker__day ui-datepicker__day--muted">28</button><button class="ui-datepicker__day ui-datepicker__day--muted">29</button><button class="ui-datepicker__day ui-datepicker__day--muted">30</button>
                <button class="ui-datepicker__day">1</button><button class="ui-datepicker__day">2</button><button class="ui-datepicker__day">3</button><button class="ui-datepicker__day">4</button><button class="ui-datepicker__day">5</button><button class="ui-datepicker__day">6</button><button class="ui-datepicker__day">7</button>
                <button class="ui-datepicker__day">8</button><button class="ui-datepicker__day">9</button><button class="ui-datepicker__day">10</button><button class="ui-datepicker__day">11</button><button class="ui-datepicker__day">12</button><button class="ui-datepicker__day">13</button><button class="ui-datepicker__day">14</button>
                <button class="ui-datepicker__day">15</button><button class="ui-datepicker__day">16</button><button class="ui-datepicker__day">17</button><button class="ui-datepicker__day">18</button><button class="ui-datepicker__day">19</button><button class="ui-datepicker__day">20</button><button class="ui-datepicker__day">21</button>
                <button class="ui-datepicker__day">22</button><button class="ui-datepicker__day">23</button><button class="ui-datepicker__day">24</button><button class="ui-datepicker__day ui-datepicker__day--selected">25</button><button class="ui-datepicker__day ui-datepicker__day--today">26</button><button class="ui-datepicker__day">27</button><button class="ui-datepicker__day">28</button>
                <button class="ui-datepicker__day">29</button><button class="ui-datepicker__day">30</button><button class="ui-datepicker__day">31</button>
              </div>
              <div class="ui-datepicker__footer">
                <button class="ui-button ui-button--ghost ui-button--sm">Cancel</button>
                <button class="ui-button ui-button--primary ui-button--sm">Apply</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--md">
          <label class="ui-label">Appointment Date</label>
          <div class="ui-datepicker">
            <div class="ui-datepicker__input-wrapper">
              <input type="text" class="ui-input" placeholder="MM/DD/YYYY" readonly value="03/30/2026">
              <span class="ui-datepicker__icon">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
            </div>
            <div class="ui-datepicker__calendar">
              <div class="ui-datepicker__header">
                <button class="ui-datepicker__nav">&#8249;</button>
                <span class="ui-datepicker__month-year">March 2026</span>
                <button class="ui-datepicker__nav">&#8250;</button>
              </div>
              <div class="ui-datepicker__grid">
                <div class="ui-datepicker__weekday">Su</div><div class="ui-datepicker__weekday">Mo</div><div class="ui-datepicker__weekday">Tu</div><div class="ui-datepicker__weekday">We</div><div class="ui-datepicker__weekday">Th</div><div class="ui-datepicker__weekday">Fr</div><div class="ui-datepicker__weekday">Sa</div>
                <button class="ui-datepicker__day ui-datepicker__day--muted">23</button><button class="ui-datepicker__day ui-datepicker__day--muted">24</button><button class="ui-datepicker__day ui-datepicker__day--muted">25</button><button class="ui-datepicker__day ui-datepicker__day--muted">26</button><button class="ui-datepicker__day ui-datepicker__day--muted">27</button><button class="ui-datepicker__day ui-datepicker__day--muted">28</button>
                <button class="ui-datepicker__day">1</button><button class="ui-datepicker__day">2</button><button class="ui-datepicker__day">3</button><button class="ui-datepicker__day">4</button><button class="ui-datepicker__day">5</button><button class="ui-datepicker__day">6</button><button class="ui-datepicker__day">7</button>
                <button class="ui-datepicker__day">8</button><button class="ui-datepicker__day">9</button><button class="ui-datepicker__day">10</button><button class="ui-datepicker__day">11</button><button class="ui-datepicker__day">12</button><button class="ui-datepicker__day">13</button><button class="ui-datepicker__day">14</button>
                <button class="ui-datepicker__day">15</button><button class="ui-datepicker__day">16</button><button class="ui-datepicker__day">17</button><button class="ui-datepicker__day">18</button><button class="ui-datepicker__day">19</button><button class="ui-datepicker__day">20</button><button class="ui-datepicker__day">21</button>
                <button class="ui-datepicker__day">22</button><button class="ui-datepicker__day">23</button><button class="ui-datepicker__day">24</button><button class="ui-datepicker__day">25</button><button class="ui-datepicker__day">26</button><button class="ui-datepicker__day">27</button><button class="ui-datepicker__day">28</button>
                <button class="ui-datepicker__day ui-datepicker__day--today">29</button><button class="ui-datepicker__day ui-datepicker__day--selected">30</button><button class="ui-datepicker__day">31</button>
              </div>
              <div class="ui-datepicker__footer">
                <button class="ui-button ui-button--ghost ui-button--sm">Cancel</button>
                <button class="ui-button ui-button--primary ui-button--sm">Apply</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Event Date</label>
          <div class="ui-datepicker">
            <div class="ui-datepicker__input-wrapper">
              <input type="text" class="ui-input" placeholder="MM/DD/YYYY" readonly value="07/04/2026">
              <span class="ui-datepicker__icon">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
              </span>
            </div>
            <div class="ui-datepicker__calendar">
              <div class="ui-datepicker__header">
                <button class="ui-datepicker__nav">&#8249;</button>
                <span class="ui-datepicker__month-year">July 2026</span>
                <button class="ui-datepicker__nav">&#8250;</button>
              </div>
              <div class="ui-datepicker__grid">
                <div class="ui-datepicker__weekday">Su</div><div class="ui-datepicker__weekday">Mo</div><div class="ui-datepicker__weekday">Tu</div><div class="ui-datepicker__weekday">We</div><div class="ui-datepicker__weekday">Th</div><div class="ui-datepicker__weekday">Fr</div><div class="ui-datepicker__weekday">Sa</div>
                <button class="ui-datepicker__day ui-datepicker__day--muted">28</button><button class="ui-datepicker__day ui-datepicker__day--muted">29</button><button class="ui-datepicker__day ui-datepicker__day--muted">30</button>
                <button class="ui-datepicker__day">1</button><button class="ui-datepicker__day">2</button><button class="ui-datepicker__day">3</button><button class="ui-datepicker__day ui-datepicker__day--selected">4</button><button class="ui-datepicker__day">5</button>
                <button class="ui-datepicker__day">6</button><button class="ui-datepicker__day">7</button><button class="ui-datepicker__day">8</button><button class="ui-datepicker__day">9</button><button class="ui-datepicker__day">10</button><button class="ui-datepicker__day">11</button><button class="ui-datepicker__day">12</button>
                <button class="ui-datepicker__day">13</button><button class="ui-datepicker__day">14</button><button class="ui-datepicker__day">15</button><button class="ui-datepicker__day">16</button><button class="ui-datepicker__day">17</button><button class="ui-datepicker__day">18</button><button class="ui-datepicker__day">19</button>
                <button class="ui-datepicker__day">20</button><button class="ui-datepicker__day">21</button><button class="ui-datepicker__day">22</button><button class="ui-datepicker__day">23</button><button class="ui-datepicker__day">24</button><button class="ui-datepicker__day">25</button><button class="ui-datepicker__day">26</button>
                <button class="ui-datepicker__day">27</button><button class="ui-datepicker__day">28</button><button class="ui-datepicker__day">29</button><button class="ui-datepicker__day">30</button><button class="ui-datepicker__day">31</button>
              </div>
              <div class="ui-datepicker__footer">
                <button class="ui-button ui-button--ghost ui-button--sm">Cancel</button>
                <button class="ui-button ui-button--primary ui-button--sm">Apply</button>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
