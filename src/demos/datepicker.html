<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { padding: 20px; background: var(--ui-color-bg); }
  </style>
</head>
<body>
  <div class="ui-datepicker" style="max-width:300px;">
    <div class="ui-datepicker__input-wrapper">
      <input type="text" class="ui-input" placeholder="Select date" value="Mar 30, 2026">
      <span class="ui-datepicker__icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></span>
    </div>
    <div class="ui-datepicker__calendar">
      <div class="ui-datepicker__header">
        <button class="ui-datepicker__nav"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
        <span class="ui-datepicker__month-year">March 2026</span>
        <button class="ui-datepicker__nav"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
      </div>
      <div class="ui-datepicker__grid">
        <div class="ui-datepicker__weekday">Su</div><div class="ui-datepicker__weekday">Mo</div><div class="ui-datepicker__weekday">Tu</div><div class="ui-datepicker__weekday">We</div><div class="ui-datepicker__weekday">Th</div><div class="ui-datepicker__weekday">Fr</div><div class="ui-datepicker__weekday">Sa</div>
        <div class="ui-datepicker__day ui-datepicker__day--muted">23</div><div class="ui-datepicker__day ui-datepicker__day--muted">24</div><div class="ui-datepicker__day ui-datepicker__day--muted">25</div><div class="ui-datepicker__day ui-datepicker__day--muted">26</div><div class="ui-datepicker__day ui-datepicker__day--muted">27</div><div class="ui-datepicker__day ui-datepicker__day--muted">28</div><div class="ui-datepicker__day">1</div>
        <div class="ui-datepicker__day">2</div><div class="ui-datepicker__day">3</div><div class="ui-datepicker__day">4</div><div class="ui-datepicker__day">5</div><div class="ui-datepicker__day">6</div><div class="ui-datepicker__day">7</div><div class="ui-datepicker__day">8</div>
        <div class="ui-datepicker__day">9</div><div class="ui-datepicker__day">10</div><div class="ui-datepicker__day">11</div><div class="ui-datepicker__day">12</div><div class="ui-datepicker__day">13</div><div class="ui-datepicker__day">14</div><div class="ui-datepicker__day ui-datepicker__day--today">15</div>
        <div class="ui-datepicker__day">16</div><div class="ui-datepicker__day ui-datepicker__day--selected">17</div><div class="ui-datepicker__day">18</div><div class="ui-datepicker__day">19</div><div class="ui-datepicker__day">20</div><div class="ui-datepicker__day">21</div><div class="ui-datepicker__day">22</div>
        <div class="ui-datepicker__day">23</div><div class="ui-datepicker__day">24</div><div class="ui-datepicker__day">25</div><div class="ui-datepicker__day">26</div><div class="ui-datepicker__day">27</div><div class="ui-datepicker__day">28</div><div class="ui-datepicker__day">29</div>
        <div class="ui-datepicker__day">30</div><div class="ui-datepicker__day">31</div>
      </div>
      <div class="ui-datepicker__footer"><button class="ui-button ui-button--ghost ui-button--sm">Today</button></div>
    </div>
  </div>
</body>
</html>
