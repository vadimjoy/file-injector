<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>File Upload Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 24px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>File Upload</h2>
    
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <div class="ui-file-upload ui-file-upload--sm">
          <input type="file" accept="*/*">
          <div class="ui-file-upload__icon">
            <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <span class="ui-file-upload__title">Drop file here</span>
          <span class="ui-file-upload__hint">or click to browse</span>
          <span class="ui-file-upload__btn">Upload</span>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium (Default)</h3>
      <div class="component-grid">
        <div class="ui-file-upload">
          <input type="file" accept="image/*">
          <div class="ui-file-upload__icon">
            <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
          </div>
          <span class="ui-file-upload__title">Upload your images</span>
          <span class="ui-file-upload__hint">Drag & drop or click to browse</span>
          <span class="ui-file-upload__btn">Select Files</span>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <div class="ui-file-upload ui-file-upload--lg">
          <input type="file" accept=".pdf,.doc,.docx">
          <div class="ui-file-upload__icon">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <span class="ui-file-upload__title">Upload Documents</span>
          <span class="ui-file-upload__hint">Drop PDF, DOC, or DOCX files here</span>
          <span class="ui-file-upload__btn">Browse Files</span>
        </div>
      </div>
    </div>
  </section>
</body>
</html>
