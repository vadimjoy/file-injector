<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { padding: 20px; background: var(--ui-color-bg); display:flex;justify-content:center; }
  </style>
</head>
<body>
  <div class="ui-file-upload" style="max-width:400px;">
    <input type="file" multiple>
    <svg class="ui-file-upload__icon" width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    <span class="ui-file-upload__title">Drop files here</span>
    <span class="ui-file-upload__hint">or click to browse</span>
    <span class="ui-file-upload__btn">Choose Files</span>
  </div>
</body>
</html>
