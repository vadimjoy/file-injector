<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Input Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
      gap: 16px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Inputs</h2>
    
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Text Input</label>
          <input type="text" class="ui-input" placeholder="Enter text...">
          <span class="ui-helper">Helper text</span>
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Email Input</label>
          <input type="email" class="ui-input" placeholder="email@example.com">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Password Input</label>
          <input type="password" class="ui-input" placeholder="••••••">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Number Input</label>
          <input type="number" class="ui-input" placeholder="123">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Tel Input</label>
          <input type="tel" class="ui-input" placeholder="+1 (555) 123-4567">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">URL Input</label>
          <input type="url" class="ui-input" placeholder="https://example.com">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Error State</label>
          <input type="text" class="ui-input ui-input--error" value="Invalid value">
          <span class="ui-error">Please enter a valid value</span>
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Success State</label>
          <input type="text" class="ui-input ui-input--success" value="Valid value">
          <span class="ui-success-text">Looks good!</span>
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Warning State</label>
          <input type="text" class="ui-input ui-input--warning" value="Almost there">
          <span class="ui-helper">Check your spelling</span>
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Disabled Input</label>
          <input type="text" class="ui-input" value="Cannot edit this" disabled>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--md">
          <label class="ui-label">Text Input</label>
          <input type="text" class="ui-input" placeholder="Enter text...">
          <span class="ui-helper">Helper text</span>
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Email Input</label>
          <input type="email" class="ui-input" placeholder="email@example.com">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Password Input</label>
          <input type="password" class="ui-input" placeholder="••••••">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Number Input</label>
          <input type="number" class="ui-input" placeholder="123">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Tel Input</label>
          <input type="tel" class="ui-input" placeholder="+1 (555) 123-4567">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">URL Input</label>
          <input type="url" class="ui-input" placeholder="https://example.com">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Error State</label>
          <input type="text" class="ui-input ui-input--error" value="Invalid value">
          <span class="ui-error">Please enter a valid value</span>
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Success State</label>
          <input type="text" class="ui-input ui-input--success" value="Valid value">
          <span class="ui-success-text">Looks good!</span>
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Warning State</label>
          <input type="text" class="ui-input ui-input--warning" value="Almost there">
          <span class="ui-helper">Check your spelling</span>
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Disabled Input</label>
          <input type="text" class="ui-input" value="Cannot edit this" disabled>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Text Input</label>
          <input type="text" class="ui-input" placeholder="Enter text...">
          <span class="ui-helper">Helper text</span>
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Email Input</label>
          <input type="email" class="ui-input" placeholder="email@example.com">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Password Input</label>
          <input type="password" class="ui-input" placeholder="••••••">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Number Input</label>
          <input type="number" class="ui-input" placeholder="123">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Tel Input</label>
          <input type="tel" class="ui-input" placeholder="+1 (555) 123-4567">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">URL Input</label>
          <input type="url" class="ui-input" placeholder="https://example.com">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Error State</label>
          <input type="text" class="ui-input ui-input--error" value="Invalid value">
          <span class="ui-error">Please enter a valid value</span>
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Success State</label>
          <input type="text" class="ui-input ui-input--success" value="Valid value">
          <span class="ui-success-text">Looks good!</span>
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Warning State</label>
          <input type="text" class="ui-input ui-input--warning" value="Almost there">
          <span class="ui-helper">Check your spelling</span>
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Disabled Input</label>
          <input type="text" class="ui-input" value="Cannot edit this" disabled>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
