<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { padding: 20px; background: var(--ui-color-bg); }
    .grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .item { display: flex; flex-direction: column; gap: 6px; }
    .label { font-size: 11px; color: var(--ui-color-text-muted); text-transform: uppercase; }
  </style>
</head>
<body>
  <div class="grid">
    <div class="item"><span class="label">Default</span><input type="text" class="ui-input" placeholder="Placeholder"></div>
    <div class="item"><span class="label">With Icon</span>
      <div class="ui-input-wrapper">
        <span class="ui-input-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></span>
        <input type="text" class="ui-input" placeholder="Search...">
      </div>
    </div>
    <div class="item"><span class="label">Error</span><input type="text" class="ui-input ui-input--error" value="Invalid"></div>
    <div class="item"><span class="label">Success</span><input type="text" class="ui-input ui-input--success" value="Valid"></div>
    <div class="item"><span class="label">Disabled</span><input type="text" class="ui-input" placeholder="Disabled" disabled></div>
    <div class="item"><span class="label">Select</span>
      <select class="ui-select"><option>Option 1</option><option>Option 2</option></select>
    </div>
  </div>
</body>
</html>
