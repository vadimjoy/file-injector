<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kbd - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Kbd</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Single keys</h3>
      <div class="u-stack" style="flex-direction:row;flex-wrap:wrap;gap:8px;align-items:center;">
        <kbd class="ui-kbd">Ctrl</kbd>
        <kbd class="ui-kbd">Alt</kbd>
        <kbd class="ui-kbd">Shift</kbd>
        <kbd class="ui-kbd">⌘</kbd>
        <kbd class="ui-kbd">⌥</kbd>
        <kbd class="ui-kbd">↑</kbd>
        <kbd class="ui-kbd">↓</kbd>
        <kbd class="ui-kbd">Enter</kbd>
        <kbd class="ui-kbd">Esc</kbd>
        <kbd class="ui-kbd">Tab</kbd>
        <kbd class="ui-kbd">Space</kbd>
        <kbd class="ui-kbd">Delete</kbd>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="u-stack" style="flex-direction:row;gap:16px;align-items:center;">
        <kbd class="ui-kbd ui-kbd--sm">⌘K</kbd>
        <kbd class="ui-kbd">⌘K</kbd>
        <kbd class="ui-kbd ui-kbd--lg">⌘K</kbd>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Shortcuts</h3>
      <div class="u-stack">
        <span class="ui-shortcut">
          <kbd class="ui-kbd">⌘</kbd>
          <span class="ui-shortcut__sep">+</span>
          <kbd class="ui-kbd">S</kbd>
        </span>
        <span class="ui-shortcut">
          <kbd class="ui-kbd">⌘</kbd>
          <span class="ui-shortcut__sep">+</span>
          <kbd class="ui-kbd">Z</kbd>
        </span>
        <span class="ui-shortcut">
          <kbd class="ui-kbd">⌘</kbd>
          <span class="ui-shortcut__sep">+</span>
          <kbd class="ui-kbd">K</kbd>
        </span>
        <span class="ui-shortcut">
          <kbd class="ui-kbd">⌘</kbd>
          <span class="ui-shortcut__sep">+</span>
          <kbd class="ui-kbd">T</kbd>
        </span>
        <span class="ui-shortcut">
          <kbd class="ui-kbd">⌘</kbd>
          <span class="ui-shortcut__sep">+</span>
          <kbd class="ui-kbd">W</kbd>
        </span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">In context</h3>
      <div class="u-stack" style="max-width:320px;">
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;">
          <span class="ui-text-body">Save file</span>
          <span class="ui-shortcut ui-shortcut--inline"><kbd class="ui-kbd ui-kbd--sm">⌘</kbd><kbd class="ui-kbd ui-kbd--sm">S</kbd></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;">
          <span class="ui-text-body">Find</span>
          <span class="ui-shortcut ui-shortcut--inline"><kbd class="ui-kbd ui-kbd--sm">⌘</kbd><kbd class="ui-kbd ui-kbd--sm">F</kbd></span>
        </div>
        <div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;">
          <span class="ui-text-body">Quit</span>
          <span class="ui-shortcut ui-shortcut--inline"><kbd class="ui-kbd ui-kbd--sm">⌘</kbd><kbd class="ui-kbd ui-kbd--sm">Q</kbd></span>
        </div>
      </div>
    </div>

  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
