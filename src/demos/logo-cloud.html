<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Logo Cloud - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Logo Cloud</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Default</h3>
      <div class="ui-logo-cloud">
        <div class="ui-logo-cloud__item">Atlas</div>
        <div class="ui-logo-cloud__item">Helix</div>
        <div class="ui-logo-cloud__item">Nova</div>
        <div class="ui-logo-cloud__item">Orbit</div>
        <div class="ui-logo-cloud__item">Prism</div>
        <div class="ui-logo-cloud__item">Axiom</div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="ui-logo-cloud ui-logo-cloud--sm">
        <div class="ui-logo-cloud__item">Atlas</div>
        <div class="ui-logo-cloud__item">Helix</div>
        <div class="ui-logo-cloud__item">Nova</div>
      </div>
      <div class="ui-logo-cloud ui-logo-cloud--lg">
        <div class="ui-logo-cloud__item">Atlas</div>
        <div class="ui-logo-cloud__item">Helix</div>
        <div class="ui-logo-cloud__item">Nova</div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With divider context</h3>
      <div class="ui-divider ui-divider--label">Trusted by teams at</div>
      <div class="ui-logo-cloud">
        <div class="ui-logo-cloud__item">Atlas</div>
        <div class="ui-logo-cloud__item">Helix</div>
        <div class="ui-logo-cloud__item">Nova</div>
        <div class="ui-logo-cloud__item">Orbit</div>
        <div class="ui-logo-cloud__item">Prism</div>
        <div class="ui-logo-cloud__item">Axiom</div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With icons</h3>
      <div class="ui-logo-cloud">
        <div class="ui-logo-cloud__item u-gap-2">
          <span class="ui-icon-tile ui-icon-tile--neutral ui-icon-tile--sm">
            <i class="fa fa-globe" aria-hidden="true"></i>
          </span>
          Atlas
        </div>
        <div class="ui-logo-cloud__item u-gap-2">
          <span class="ui-icon-tile ui-icon-tile--neutral ui-icon-tile--sm">
            <i class="fa fa-refresh" aria-hidden="true"></i>
          </span>
          Helix
        </div>
        <div class="ui-logo-cloud__item u-gap-2">
          <span class="ui-icon-tile ui-icon-tile--neutral ui-icon-tile--sm">
            <i class="fa fa-star" aria-hidden="true"></i>
          </span>
          Nova
        </div>
        <div class="ui-logo-cloud__item u-gap-2">
          <span class="ui-icon-tile ui-icon-tile--neutral ui-icon-tile--sm">
            <i class="fa fa-circle-o" aria-hidden="true"></i>
          </span>
          Orbit
        </div>
        <div class="ui-logo-cloud__item u-gap-2">
          <span class="ui-icon-tile ui-icon-tile--neutral ui-icon-tile--sm">
            <i class="fa fa-cube" aria-hidden="true"></i>
          </span>
          Prism
        </div>
        <div class="ui-logo-cloud__item u-gap-2">
          <span class="ui-icon-tile ui-icon-tile--neutral ui-icon-tile--sm">
            <i class="fa fa-bolt" aria-hidden="true"></i>
          </span>
          Axiom
        </div>
      </div>
    </div>

  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
