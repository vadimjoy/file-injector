<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Progress Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <style>
    body { 
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--ui-color-bg); 
      padding: 48px 24px; 
      max-width: 1200px;
      margin: 0 auto;
    }
    .section { margin-bottom: 48px; }
    .section h2 { 
      font-size: 28px; 
      font-weight: 600; 
      margin-bottom: 24px; 
      color: var(--ui-color-text);
      border-bottom: 1px solid var(--ui-color-border);
      padding-bottom: 12px;
    }
    .size-group { margin-bottom: 32px; }
    .size-group h3 { 
      font-size: 14px; 
      font-weight: 500; 
      color: var(--ui-color-text-secondary); 
      margin-bottom: 16px; 
      text-transform: uppercase; 
      letter-spacing: 0.05em; 
    }
    .component-grid { 
      display: grid; 
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); 
      gap: 24px; 
    }
  </style>
</head>
<body>
  <section class="section">
    <h2>Progress</h2>
    
    <div class="size-group">
      <h3>Small</h3>
      <div class="component-grid">
        <div class="ui-progress ui-progress--sm">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Uploading...</span>
            <span class="ui-progress__value">45%</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 45%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--sm ui-progress--warning">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Almost done</span>
            <span class="ui-progress__value">85%</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 85%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--sm ui-progress--error">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Error</span>
            <span class="ui-progress__value">Failed</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 30%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--sm ui-progress--striped ui-progress--animated">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Loading...</span>
            <span class="ui-progress__value">Processing</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 70%;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Medium</h3>
      <div class="component-grid">
        <div class="ui-progress ui-progress--md">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Uploading...</span>
            <span class="ui-progress__value">45%</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 45%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--md ui-progress--warning">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Almost done</span>
            <span class="ui-progress__value">85%</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 85%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--md ui-progress--error">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Error</span>
            <span class="ui-progress__value">Failed</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 30%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--md ui-progress--striped ui-progress--animated">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Loading...</span>
            <span class="ui-progress__value">Processing</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 70%;"></div>
          </div>
        </div>
      </div>
    </div>

    <div class="size-group">
      <h3>Large</h3>
      <div class="component-grid">
        <div class="ui-progress ui-progress--lg">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Uploading</span>
            <span class="ui-progress__value">45%</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 45%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--lg ui-progress--warning">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Almost done</span>
            <span class="ui-progress__value">85%</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 85%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--lg ui-progress--error">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Error</span>
            <span class="ui-progress__value">Failed</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 30%;"></div>
          </div>
        </div>
        <div class="ui-progress ui-progress--lg ui-progress--striped ui-progress--animated">
          <div class="ui-progress__header">
            <span class="ui-progress__label">Loading...</span>
            <span class="ui-progress__value">Processing</span>
          </div>
          <div class="ui-progress__track">
            <div class="ui-progress__bar" style="width: 70%;"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
