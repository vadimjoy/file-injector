<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Radio Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Radio</h2>
    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm" checked>
          <span>Standard shipping</span>
        </label>
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm">
          <span>Express shipping</span>
        </label>
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm">
          <span>Free shipping</span>
        </label>
        <label class="ui-radio ui-radio--sm">
          <input type="radio" name="radio-sm" disabled>
          <span>Not available</span>
        </label>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md" checked>
          <span>Standard shipping</span>
        </label>
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md">
          <span>Express shipping</span>
        </label>
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md">
          <span>Free shipping</span>
        </label>
        <label class="ui-radio ui-radio--md">
          <input type="radio" name="radio-md" disabled>
          <span>Not available</span>
        </label>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg" checked>
          <span>Standard shipping</span>
        </label>
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg">
          <span>Express shipping</span>
        </label>
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg">
          <span>Free shipping</span>
        </label>
        <label class="ui-radio ui-radio--lg">
          <input type="radio" name="radio-lg" disabled>
          <span>Not available</span>
        </label>
      </div>
    </div>
  </section>
<script src="./shared/demo-theme.js"></script>
</body>
</html>
