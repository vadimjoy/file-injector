<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rating - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Rating</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="u-stack">

        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:11px;color:var(--ui-color-text-muted);font-family:var(--ui-font-family)">sm — 3/5</span>
          <div class="ui-rating ui-rating--sm ui-rating--readonly" role="img" aria-label="3 out of 5 stars">
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
            <button class="ui-rating__star" type="button" aria-label="4 stars">★</button>
            <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:11px;color:var(--ui-color-text-muted);font-family:var(--ui-font-family)">md — 4/5</span>
          <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="4 out of 5 stars">
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="4 stars">★</button>
            <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
          </div>
        </div>

        <div style="display:flex;flex-direction:column;gap:4px">
          <span style="font-size:11px;color:var(--ui-color-text-muted);font-family:var(--ui-font-family)">lg — 5/5</span>
          <div class="ui-rating ui-rating--lg ui-rating--readonly" role="img" aria-label="5 out of 5 stars">
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="4 stars">★</button>
            <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="5 stars">★</button>
          </div>
        </div>

      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Interactive</h3>
      <div class="u-stack">
        <div class="ui-rating ui-rating--md" role="group" aria-label="Rate this item">
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="4 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
        </div>
        <p style="font-size:var(--ui-font-size-sm);color:var(--ui-color-text-muted);font-family:var(--ui-font-family);margin:0">Hover over stars to preview rating</p>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With count</h3>
      <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="4 out of 5 stars, 128 reviews">
        <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
        <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
        <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
        <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="4 stars">★</button>
        <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
        <span class="ui-rating__count">(128 reviews)</span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">States</h3>
      <div class="u-stack">

        <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="1 out of 5 stars">
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
          <button class="ui-rating__star" type="button" aria-label="2 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="3 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="4 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
        </div>

        <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="2 out of 5 stars">
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="3 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="4 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
        </div>

        <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="3 out of 5 stars">
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="4 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
        </div>

        <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="4 out of 5 stars">
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="4 stars">★</button>
          <button class="ui-rating__star" type="button" aria-label="5 stars">★</button>
        </div>

        <div class="ui-rating ui-rating--md ui-rating--readonly" role="img" aria-label="5 out of 5 stars">
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="1 star">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="2 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="3 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="4 stars">★</button>
          <button class="ui-rating__star ui-rating__star--filled" type="button" aria-label="5 stars">★</button>
        </div>

      </div>
    </div>

  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
