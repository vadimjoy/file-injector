<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Search</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="u-stack">
        <div class="ui-search ui-search--sm">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Search...">
        </div>
        <div class="ui-search ui-search--md">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Search...">
        </div>
        <div class="ui-search ui-search--lg">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Search...">
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With keyboard hint</h3>
      <div class="ui-search ui-search--md">
        <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
        <input class="ui-search__input" type="search" placeholder="Search...">
        <span class="ui-search__kbd"><kbd>⌘</kbd><kbd>K</kbd></span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">States</h3>
      <div class="u-stack">
        <div class="ui-search ui-search--md">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Normal...">
        </div>
        <div class="ui-search ui-search--md">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Focused..." style="border-color:var(--ui-color-border-focus);box-shadow:0 0 0 3px var(--ui-color-primary-soft);background:var(--ui-color-bg);">
        </div>
        <div class="ui-search ui-search--md">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Disabled..." disabled>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Full width</h3>
      <div style="max-width:400px;">
        <div class="ui-search ui-search--md">
          <span class="ui-search__icon"><i class="fa fa-search" aria-hidden="true"></i></span>
          <input class="ui-search__input" type="search" placeholder="Search...">
          <span class="ui-search__kbd"><kbd>⌘</kbd><kbd>K</kbd></span>
        </div>
      </div>
    </div>
  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
