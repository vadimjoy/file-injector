<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sidebar - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Sidebar</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Default</h3>
      <div class="u-demo-frame">
        <nav class="ui-sidebar">
          <div class="ui-sidebar__header">
            <div class="ui-sidebar__logo">
              <i class="fa fa-magic" aria-hidden="true" class="ui-icon ui-icon--lg ui-icon--primary"></i>
            </div>
            <div class="ui-sidebar__header-text">
              <span class="ui-sidebar__brand">AI CSS Kit</span>
              <span class="ui-sidebar__tagline">Workspace</span>
            </div>
          </div>

          <div class="ui-sidebar__nav">
            <span class="ui-sidebar__section-label">Main</span>
            <a class="ui-sidebar__item ui-sidebar__item--active" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-home" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Dashboard</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-tasks" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Tasks</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-calendar" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Calendar</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-bar-chart" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Reports</span>
            </a>

            <span class="ui-sidebar__section-label">Settings</span>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-cog" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Settings</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-question-circle" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Help</span>
            </a>
          </div>

          <div class="ui-sidebar__footer">
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-sign-out" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Logout</span>
            </a>
          </div>
        </nav>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Collapsed</h3>
      <div class="u-demo-frame">
        <nav class="ui-sidebar ui-sidebar--collapsed">
          <div class="ui-sidebar__header">
            <div class="ui-sidebar__logo">
              <i class="fa fa-magic" aria-hidden="true" class="ui-icon ui-icon--lg ui-icon--primary"></i>
            </div>
            <div class="ui-sidebar__header-text">
              <span class="ui-sidebar__brand">AI CSS Kit</span>
              <span class="ui-sidebar__tagline">Workspace</span>
            </div>
          </div>

          <div class="ui-sidebar__nav">
            <span class="ui-sidebar__section-label">Main</span>
            <a class="ui-sidebar__item ui-sidebar__item--active" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-home" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Dashboard</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-tasks" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Tasks</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-calendar" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Calendar</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-bar-chart" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Reports</span>
            </a>

            <span class="ui-sidebar__section-label">Settings</span>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-cog" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Settings</span>
            </a>
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-question-circle" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Help</span>
            </a>
          </div>

          <div class="ui-sidebar__footer">
            <a class="ui-sidebar__item" href="#">
              <span class="ui-sidebar__item-icon"><i class="fa fa-sign-out" aria-hidden="true"></i></span>
              <span class="ui-sidebar__item-text">Logout</span>
            </a>
          </div>
        </nav>
      </div>
    </div>
  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
