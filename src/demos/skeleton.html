<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Skeleton</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Text lines</h3>
      <div class="u-stack">

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text" style="width:100%"></span>
        <!-- demo: token override -->

        <!-- demo: token override -->

      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Shapes</h3>
      <div class="u-stack">

        <div class="u-cluster">
          <span class="ui-skeleton ui-skeleton--avatar-sm"></span>
          <span class="ui-skeleton ui-skeleton--avatar-md"></span>
          <span class="ui-skeleton ui-skeleton--avatar-lg"></span>

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--btn" style="width:120px"></span>

        <span class="ui-skeleton ui-skeleton--card"></span>

      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Card composition</h3>
      <div class="u-stack">

        <div class="u-bordered u-pad-4 u-flex-col u-gap-4">

          <div class="u-cluster u-cluster--compact">
            <span class="ui-skeleton ui-skeleton--avatar-sm" ></span>
            <div class="u-flex-col u-gap-2 u-flex-1">
              <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text" style="width:45%"></span>
              <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text-sm" style="width:30%"></span>
            </div>
          </div>

          <div class="u-flex-col u-gap-2">
            <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text" style="width:100%"></span>
            <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text" style="width:88%"></span>
            <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text" style="width:65%"></span>
          </div>

        </div>

      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Variants</h3>
      <div class="u-stack">

        <div class="u-flex-col u-gap-2">
          <!-- demo: token override -->
          <span style="font-size:var(--ui-font-size-xs);color:var(--ui-color-text-muted);font-family:var(--ui-font-family);">Shimmer (default)</span>
          <!-- demo: token override -->

        <!-- demo: token override -->

          <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text" style="width:55%"></span>
        </div>

        <div class="u-flex-col u-gap-2">
          <!-- demo: token override -->
          <span style="font-size:var(--ui-font-size-xs);color:var(--ui-color-text-muted);font-family:var(--ui-font-family);">Pulse (fade animation)</span>
          <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text ui-skeleton--pulse" style="width:70%"></span>
          <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text ui-skeleton--pulse" style="width:55%"></span>
        </div>

        <div class="u-flex-col u-gap-2">
          <!-- demo: token override -->
          <span style="font-size:var(--ui-font-size-xs);color:var(--ui-color-text-muted);font-family:var(--ui-font-family);">Static (no animation)</span>
          <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text ui-skeleton--static" style="width:70%"></span>
          <!-- demo: token override -->

        <!-- demo: token override -->

        <span class="ui-skeleton ui-skeleton--text ui-skeleton--static" style="width:55%"></span>
        </div>
