<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Slider Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Slider</h2>
    
    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-grid">
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Volume: 25%</label>
          <input type="range" class="ui-slider ui-slider--sm" value="25" min="0" max="100">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Opacity: 50%</label>
          <input type="range" class="ui-slider ui-slider--sm" value="50" min="0" max="100">
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Saturation: 75%</label>
          <input type="range" class="ui-slider ui-slider--sm" value="75" min="0" max="100">
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-grid">
        <div class="ui-field ui-field--md">
          <label class="ui-label">Volume: 25%</label>
          <input type="range" class="ui-slider ui-slider--md" value="25" min="0" max="100">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Opacity: 50%</label>
          <input type="range" class="ui-slider ui-slider--md" value="50" min="0" max="100">
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Saturation: 75%</label>
          <input type="range" class="ui-slider ui-slider--md" value="75" min="0" max="100">
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-grid">
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Volume: 25%</label>
          <input type="range" class="ui-slider ui-slider--lg" value="25" min="0" max="100">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Opacity: 50%</label>
          <input type="range" class="ui-slider ui-slider--lg" value="50" min="0" max="100">
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Saturation: 75%</label>
          <input type="range" class="ui-slider ui-slider--lg" value="75" min="0" max="100">
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
