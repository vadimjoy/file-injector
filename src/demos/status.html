<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Status</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Variants</h3>
      <div class="u-stack">
        <span class="ui-status ui-status--online ui-status--md">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Online</span>
        </span>
        <span class="ui-status ui-status--offline ui-status--md">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Offline</span>
        </span>
        <span class="ui-status ui-status--warning ui-status--md">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Degraded</span>
        </span>
        <span class="ui-status ui-status--error ui-status--md">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Error</span>
        </span>
        <span class="ui-status ui-status--pending ui-status--md">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Connecting</span>
        </span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div class="u-stack">
        <span class="ui-status ui-status--online ui-status--sm">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Online — sm</span>
        </span>
        <span class="ui-status ui-status--online ui-status--md">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Online — md</span>
        </span>
        <span class="ui-status ui-status--online ui-status--lg">
          <span class="ui-status__dot"></span>
          <span class="ui-status__label">Online — lg</span>
        </span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Without label</h3>
      <div class="u-cluster">
        <span class="ui-status ui-status--online ui-status--md">
          <span class="ui-status__dot"></span>
        </span>
        <span class="ui-status ui-status--offline ui-status--md">
          <span class="ui-status__dot"></span>
        </span>
        <span class="ui-status ui-status--warning ui-status--md">
          <span class="ui-status__dot"></span>
        </span>
        <span class="ui-status ui-status--error ui-status--md">
          <span class="ui-status__dot"></span>
        </span>
        <span class="ui-status ui-status--pending ui-status--md">
          <span class="ui-status__dot"></span>
        </span>
      </div>
    </div>
  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
