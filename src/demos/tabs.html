<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tabs Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Tabs</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Pill — Small</h3>
      <div class="u-stack">
        <div class="ui-tabs ui-tabs--sm" role="tablist">
          <button class="ui-tabs__item ui-tabs__item--active" type="button" role="tab" aria-selected="true">Overview</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Analytics</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Settings</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false" disabled>Billing</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Pill — Medium</h3>
      <div class="u-stack">
        <div class="ui-tabs ui-tabs--md" role="tablist">
          <button class="ui-tabs__item ui-tabs__item--active" type="button" role="tab" aria-selected="true">Overview</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Analytics</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Settings</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false" disabled>Billing</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Pill — Large</h3>
      <div class="u-stack">
        <div class="ui-tabs ui-tabs--lg" role="tablist">
          <button class="ui-tabs__item ui-tabs__item--active" type="button" role="tab" aria-selected="true">Overview</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Analytics</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Settings</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Underline — Small</h3>
      <div class="u-stack">
        <div class="ui-tabs ui-tabs--underline ui-tabs--sm" role="tablist">
          <button class="ui-tabs__item ui-tabs__item--active" type="button" role="tab" aria-selected="true">Overview</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Analytics</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Settings</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false" disabled>Billing</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Underline — Medium</h3>
      <div class="u-stack">
        <div class="ui-tabs ui-tabs--underline ui-tabs--md" role="tablist">
          <button class="ui-tabs__item ui-tabs__item--active" type="button" role="tab" aria-selected="true">Overview</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Analytics</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Settings</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false" disabled>Billing</button>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Underline — Large</h3>
      <div class="u-stack">
        <div class="ui-tabs ui-tabs--underline ui-tabs--lg" role="tablist">
          <button class="ui-tabs__item ui-tabs__item--active" type="button" role="tab" aria-selected="true">Overview</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Analytics</button>
          <button class="ui-tabs__item" type="button" role="tab" aria-selected="false">Settings</button>
        </div>
      </div>
    </div>
  </section>
<script src="./shared/demo-theme.js"></script>
</body>
</html>
