<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tag Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Tag</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-cluster u-cluster--compact">
        <span class="ui-tag ui-tag--default ui-tag--sm">Default</span>
        <span class="ui-tag ui-tag--primary ui-tag--sm">Primary</span>
        <span class="ui-tag ui-tag--success ui-tag--sm">Success</span>
        <span class="ui-tag ui-tag--warning ui-tag--sm">Warning</span>
        <span class="ui-tag ui-tag--error ui-tag--sm">Error</span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-cluster u-cluster--compact">
        <span class="ui-tag ui-tag--default ui-tag--md">Default</span>
        <span class="ui-tag ui-tag--primary ui-tag--md">Primary</span>
        <span class="ui-tag ui-tag--success ui-tag--md">Success</span>
        <span class="ui-tag ui-tag--warning ui-tag--md">Warning</span>
        <span class="ui-tag ui-tag--error ui-tag--md">Error</span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-cluster u-cluster--compact">
        <span class="ui-tag ui-tag--default ui-tag--lg">Default</span>
        <span class="ui-tag ui-tag--primary ui-tag--lg">Primary</span>
        <span class="ui-tag ui-tag--success ui-tag--lg">Success</span>
        <span class="ui-tag ui-tag--warning ui-tag--lg">Warning</span>
        <span class="ui-tag ui-tag--error ui-tag--lg">Error</span>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Removable</h3>
      <div class="u-stack">
        <div class="u-cluster u-cluster--compact">
          <span class="ui-tag ui-tag--default ui-tag--sm ui-tag--removable">
            Design
            <button class="ui-tag__remove" type="button" aria-label="Remove Design">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </span>
          <span class="ui-tag ui-tag--primary ui-tag--sm ui-tag--removable">
            React
            <button class="ui-tag__remove" type="button" aria-label="Remove React">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </span>
          <span class="ui-tag ui-tag--success ui-tag--sm ui-tag--removable">
            Deployed
            <button class="ui-tag__remove" type="button" aria-label="Remove Deployed">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </span>
        </div>
        <div class="u-cluster u-cluster--compact">
          <span class="ui-tag ui-tag--default ui-tag--md ui-tag--removable">
            TypeScript
            <button class="ui-tag__remove" type="button" aria-label="Remove TypeScript">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </span>
          <span class="ui-tag ui-tag--warning ui-tag--md ui-tag--removable">
            In Review
            <button class="ui-tag__remove" type="button" aria-label="Remove In Review">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </span>
          <span class="ui-tag ui-tag--error ui-tag--md ui-tag--removable">
            Blocked
            <button class="ui-tag__remove" type="button" aria-label="Remove Blocked">
              <i class="fa fa-times" aria-hidden="true"></i>
            </button>
          </span>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">With icon</h3>
      <div class="u-cluster u-cluster--compact">
        <span class="ui-tag ui-tag--primary ui-tag--md">
          <i class="fa fa-tag ui-tag__icon" aria-hidden="true"></i>
          Feature
        </span>
        <span class="ui-tag ui-tag--success ui-tag--md">
          <i class="fa fa-check ui-tag__icon" aria-hidden="true"></i>
          Done
        </span>
        <span class="ui-tag ui-tag--warning ui-tag--md">
          <i class="fa fa-clock-o ui-tag__icon" aria-hidden="true"></i>
          Pending
        </span>
        <span class="ui-tag ui-tag--error ui-tag--md">
          <i class="fa fa-ban ui-tag__icon" aria-hidden="true"></i>
          Blocked
        </span>
      </div>
    </div>

  </section>
<script src="./shared/demo-theme.js"></script>
</body>
</html>
