<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Textarea Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Textarea</h2>
    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-grid u-grid--compact">
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Default Textarea</label>
          <textarea class="ui-textarea" placeholder="Enter your message..."></textarea>
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Error State</label>
          <textarea class="ui-textarea ui-textarea--error">Invalid content</textarea>
          <span class="ui-error">Please correct the error</span>
        </div>
        <div class="ui-field ui-field--sm">
          <label class="ui-label">Success State</label>
          <textarea class="ui-textarea ui-textarea--success">Perfect content!</textarea>
          <span class="ui-success-text">Looks great</span>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-grid u-grid--compact">
        <div class="ui-field ui-field--md">
          <label class="ui-label">Default Textarea</label>
          <textarea class="ui-textarea" placeholder="Enter your message..."></textarea>
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Error State</label>
          <textarea class="ui-textarea ui-textarea--error">Invalid content</textarea>
          <span class="ui-error">Please correct the error</span>
        </div>
        <div class="ui-field ui-field--md">
          <label class="ui-label">Success State</label>
          <textarea class="ui-textarea ui-textarea--success">Perfect content!</textarea>
          <span class="ui-success-text">Looks great</span>
        </div>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-grid u-grid--compact">
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Default Textarea</label>
          <textarea class="ui-textarea" placeholder="Enter your message..."></textarea>
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Error State</label>
          <textarea class="ui-textarea ui-textarea--error">This is a large textarea field with an error state to demonstrate the visual feedback system.</textarea>
          <span class="ui-error">Please fix the issues above</span>
        </div>
        <div class="ui-field ui-field--lg">
          <label class="ui-label">Success State</label>
          <textarea class="ui-textarea ui-textarea--success">Perfect content!</textarea>
          <span class="ui-success-text">Looks great</span>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
