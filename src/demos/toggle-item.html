<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Item - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="./shared/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Toggle Item</h2>

    <div class="demo-group">
      <h3 class="demo-group__title">Default settings list</h3>
      <div style="border:1px solid var(--ui-color-border);border-radius:12px;padding:0 16px">

        <label class="ui-toggle-item">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Email notifications</span>
            <span class="ui-toggle-item__desc">Receive updates via email</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--md">
              <input type="checkbox" checked>
            </label>
          </div>
        </label>

        <label class="ui-toggle-item">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Push notifications</span>
            <span class="ui-toggle-item__desc">Browser push alerts</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--md">
              <input type="checkbox">
            </label>
          </div>
        </label>

        <label class="ui-toggle-item">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Data compression</span>
            <span class="ui-toggle-item__desc">gzip / brotli encoding</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--md">
              <input type="checkbox" checked>
            </label>
          </div>
        </label>

        <label class="ui-toggle-item">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Auto-save</span>
            <span class="ui-toggle-item__desc">Save changes automatically</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--md">
              <input type="checkbox" checked>
            </label>
          </div>
        </label>

      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Sizes</h3>
      <div style="border:1px solid var(--ui-color-border);border-radius:12px;padding:0 16px">

        <label class="ui-toggle-item">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Small toggle</span>
            <span class="ui-toggle-item__desc">Uses ui-toggle--sm</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--sm">
              <input type="checkbox" checked>
            </label>
          </div>
        </label>

        <label class="ui-toggle-item">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Large toggle</span>
            <span class="ui-toggle-item__desc">Uses ui-toggle--lg</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--lg">
              <input type="checkbox" checked>
            </label>
          </div>
        </label>

      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Disabled</h3>
      <div style="border:1px solid var(--ui-color-border);border-radius:12px;padding:0 16px">

        <label class="ui-toggle-item" style="opacity:0.5">
          <div class="ui-toggle-item__info">
            <span class="ui-toggle-item__label">Sync across devices</span>
            <span class="ui-toggle-item__desc">Feature not available on your plan</span>
          </div>
          <div class="ui-toggle-item__control">
            <label class="ui-toggle ui-toggle--md">
              <input type="checkbox" disabled>
            </label>
          </div>
        </label>

      </div>
    </div>

  </section>
  <script src="./shared/demo-theme.js"></script>
</body>
</html>
