<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Toggle Component - AI CSS Kit</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Toggle</h2>
    <div class="demo-group">
      <h3 class="demo-group__title">Small</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox">
          <span>Notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox" checked>
          <span>Dark mode</span>
        </label>
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox">
          <span>Auto-save</span>
        </label>
        <label class="ui-toggle ui-toggle--sm">
          <input type="checkbox" disabled>
          <span>Disabled</span>
        </label>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Medium</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox">
          <span>Email notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox" checked>
          <span>Push notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox">
          <span>Auto-save</span>
        </label>
        <label class="ui-toggle ui-toggle--md">
          <input type="checkbox" disabled>
          <span>Feature unavailable</span>
        </label>
      </div>
    </div>

    <div class="demo-group">
      <h3 class="demo-group__title">Large</h3>
      <div class="u-grid u-grid--tight u-grid--compact">
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox">
          <span>Enable all notifications</span>
        </label>
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox" checked>
          <span>Dark mode enabled</span>
        </label>
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox">
          <span>Auto-save documents</span>
        </label>
        <label class="ui-toggle ui-toggle--lg">
          <input type="checkbox" disabled>
          <span>Admin setting</span>
        </label>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
