<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tooltip Component - Pure UI</title>
  <link rel="stylesheet" href="../css/index.css">
  <link rel="stylesheet" href="../css/demo-page.css">
</head>
<body class="demo-page">
  <section class="demo-section">
    <h2 class="demo-section__title">Tooltip</h2>
    
    <div class="u-grid u-grid--tight demo-tooltip-grid">
      <div class="demo-tooltip">
        <h3 class="demo-tooltip__label">Top</h3>
        <div class="demo-box">
          <div class="ui-tooltip-wrapper">
            <button class="ui-button ui-button--secondary ui-button--sm">Hover me</button>
            <span class="ui-tooltip">Tooltip on top</span>
          </div>
        </div>
      </div>
      
      <div class="demo-tooltip">
        <h3 class="demo-tooltip__label">Bottom</h3>
        <div class="demo-box">
          <div class="ui-tooltip-wrapper">
            <button class="ui-button ui-button--secondary ui-button--sm">Hover me</button>
            <span class="ui-tooltip ui-tooltip--bottom">Tooltip on bottom</span>
          </div>
        </div>
      </div>
      
      <div class="demo-tooltip">
        <h3 class="demo-tooltip__label">Left</h3>
        <div class="demo-box">
          <div class="ui-tooltip-wrapper">
            <button class="ui-button ui-button--secondary ui-button--sm">Hover me</button>
            <span class="ui-tooltip ui-tooltip--left">Tooltip on left</span>
          </div>
        </div>
      </div>
      
      <div class="demo-tooltip">
        <h3 class="demo-tooltip__label">Right</h3>
        <div class="demo-box">
          <div class="ui-tooltip-wrapper">
            <button class="ui-button ui-button--secondary ui-button--sm">Hover me</button>
            <span class="ui-tooltip ui-tooltip--right">Tooltip on right</span>
          </div>
        </div>
      </div>
    </div>
  </section>
<script src="../js/demo-theme.js"></script>
</body>
</html>
