<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Pure UI — Component Library</title>
  <link rel="stylesheet" href="./css/index.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root { --showcase-bg: #fafafa; }
    [data-theme="dark"] { --showcase-bg: #111827; }
    * { margin: 0; padding: 0; }
    body {
      font-family: var(--ui-font-family);
      background: var(--showcase-bg);
      color: var(--ui-color-text);
      padding: 24px;
    }
    .showcase { max-width: 900px; margin: 0 auto; }
    .showcase__header { margin-bottom: 32px; }
    .showcase__title { font-size: 28px; font-weight: 700; margin-bottom: 4px; }
    .showcase__subtitle { font-size: 14px; color: var(--ui-color-text-muted); margin-bottom: 16px; }
    .showcase__theme-toggle { margin-bottom: 24px; }
    .showcase__section { margin-bottom: 16px; border-radius: 12px; overflow: hidden; border: 1px solid var(--ui-color-border); }
    .showcase__section-title {
      background: var(--ui-color-bg);
      padding: 0;
      font-size: 14px;
      font-weight: 600;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--ui-color-border);
    }
    .showcase__section-title a {
      color: var(--ui-color-text);
      text-decoration: none;
      padding: 16px 20px;
      display: block;
      flex: 1;
    }
    .showcase__section-title a:hover {
      color: var(--ui-color-primary);
    }
    .showcase__iframe {
      width: 100%;
      min-height: 300px;
      border: none;
      display: block;
    }
  </style>
</head>
<body>
  <div class="showcase">
    <header class="showcase__header">
      <h1 class="showcase__title">Pure UI</h1>
      <p class="showcase__subtitle">Minimal CSS Component Library</p>
      <div class="showcase__theme-toggle">
        <label class="ui-toggle">
          <input type="checkbox" id="theme-toggle">
          <span>Dark Theme</span>
        </label>
      </div>
    </header>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/button.html" target="_blank">Button</a></div>
      <iframe class="showcase__iframe" src="./demos/button.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/input.html" target="_blank">Input</a></div>
      <iframe class="showcase__iframe" src="./demos/input.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/checkbox.html" target="_blank">Checkbox & Radio</a></div>
      <iframe class="showcase__iframe" src="./demos/checkbox.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/badge.html" target="_blank">Badge</a></div>
      <iframe class="showcase__iframe" src="./demos/badge.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/progress.html" target="_blank">Progress</a></div>
      <iframe class="showcase__iframe" src="./demos/progress.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/slider.html" target="_blank">Slider</a></div>
      <iframe class="showcase__iframe" src="./demos/slider.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/card.html" target="_blank">Card</a></div>
      <iframe class="showcase__iframe" src="./demos/card.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/file-upload.html" target="_blank">File Upload</a></div>
      <iframe class="showcase__iframe" src="./demos/file-upload.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/tooltip.html" target="_blank">Tooltip</a></div>
      <iframe class="showcase__iframe" src="./demos/tooltip.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/autocomplete.html" target="_blank">Autocomplete</a></div>
      <iframe class="showcase__iframe" src="./demos/autocomplete.html"></iframe>
    </div>

    <div class="showcase__section">
      <div class="showcase__section-title"><a href="./demos/datepicker.html" target="_blank">Datepicker</a></div>
      <iframe class="showcase__iframe" src="./demos/datepicker.html"></iframe>
    </div>
  </div>

  <script>
    const themeToggle = document.getElementById('theme-toggle');
    const theme = localStorage.getItem('theme') || 'light';
    
    // Apply theme to main document
    if (theme === 'dark') {
      themeToggle.checked = true;
      document.documentElement.setAttribute('data-theme', 'dark');
    }

    // Function to apply theme to all iframes via postMessage
    function applyThemeToIframes(themeName) {
      document.querySelectorAll('iframe').forEach(iframe => {
        iframe.contentWindow.postMessage({ type: 'theme', theme: themeName }, '*');
      });
    }

    // Apply theme to iframes when they load
    document.querySelectorAll('iframe').forEach(iframe => {
      iframe.addEventListener('load', () => {
        const currentTheme = themeToggle.checked ? 'dark' : 'light';
        iframe.contentWindow.postMessage({ type: 'theme', theme: currentTheme }, '*');
      });
    });

    // Handle theme toggle change
    themeToggle.addEventListener('change', (e) => {
      const t = e.target.checked ? 'dark' : 'light';
      document.documentElement.setAttribute('data-theme', t);
      localStorage.setItem('theme', t);
      applyThemeToIframes(t);
    });

    // Initial theme application
    setTimeout(() => applyThemeToIframes(theme), 100);
  </script>
</body>
</html>
